<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methodical | Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../styles/shared.css">
    <link rel="stylesheet" href="../styles/signIn.css">
</head>

<body class="auth-page">
    <main class="auth-main">
        <section class="signin-panel" aria-label="Sign in form">
            <div class="signin-panel-main">
                <div class="signin-card">
                    <p class="form-eyebrow">Back To Methodical</p>
                    <h2 class="form-title">Sign in to your account</h2>

                    <div class="social-actions">
                        <button class="social-button" type="button">
                            <span class="social-icon google-icon" aria-hidden="true"></span>
                            Continue with Google
                        </button>
                        <button class="social-button" type="button">
                            <span class="social-icon apple-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                                    <path
                                        d="M15.19 12.04c.03 3.18 2.78 4.24 2.81 4.25-.02.08-.44 1.53-1.44 3.03-.87 1.29-1.77 2.57-3.2 2.6-1.41.03-1.87-.84-3.49-.84-1.62 0-2.13.81-3.46.87-1.38.05-2.43-1.38-3.31-2.66-1.8-2.6-3.17-7.35-1.33-10.56.91-1.59 2.54-2.59 4.31-2.62 1.35-.03 2.62.91 3.49.91.87 0 2.49-1.12 4.19-.96.71.03 2.69.29 3.97 2.17-.1.06-2.37 1.38-2.34 4.11Zm-2.59-6.63c.73-.88 1.23-2.1 1.09-3.32-1.05.04-2.31.7-3.06 1.58-.67.77-1.26 2-1.1 3.18 1.17.09 2.34-.6 3.07-1.44Z"
                                        fill="currentColor"></path>
                                </svg>
                            </span>
                            Continue with Apple
                        </button>
                    </div>

                    <div class="form-divider" aria-hidden="true">
                        <span></span>
                        <strong>or</strong>
                        <span></span>
                    </div>

                    <form class="signin-form" action="#">
                        <div class="field-group">
                            <label for="usernameInput">Username</label>
                            <input type="text" id="usernameInput" placeholder="Username" autocomplete="username">
                        </div>

                        <div class="field-group">
                            <div class="field-label-row">
                                <label for="passwordInput">Password</label>
                                <a href="#" class="inline-link">Forgot password?</a>
                            </div>
                            <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
                        </div>

                        <label class="checkbox-row" for="rememberMe">
                            <input type="checkbox" id="rememberMe">
                            <span>Keep me signed in on this device.</span>
                        </label>

                        <button class="create-button" id="signInBtn" type="submit">Sign in</button>

                        <p class="terms-copy">
                            New here? <a href="./signUp.html">Create an account</a> and start organizing your tasks with Methodical.
                        </p>
                    </form>
                </div>
            </div>

            <footer class="footer">
                <p class="footer-signature">Thales © 2026</p>
                <p id="taskWarning" aria-live="polite"></p>
                <ul class="footer-list">
                    <li class="footer-list-style">Privacy</li>
                    <li class="footer-list-style">Documentation</li>
                    <li class="footer-list-style">Sync Status: Active</li>
                </ul>
            </footer>
        </section>
    </main>


    <script type="module" src="./signIn.js"></script>
</body>

</html>
